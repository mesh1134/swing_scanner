name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to droplet
        # Pin third-party action by commit SHA (tag: v1.0.3).
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          timeout: 120s
          script: |
            set -euo pipefail
            REPO_DIR=/opt/swing_scanner
            APP_USER=swing
            cd "$REPO_DIR"
            sudo -u "$APP_USER" git config --global --add safe.directory "$REPO_DIR"
            PREV_SHA=$(sudo -u "$APP_USER" git -C "$REPO_DIR" rev-parse HEAD)
            TARGET_SHA=${{ github.sha }}
            rollback() {
              echo "[deploy] Rolling back to ${PREV_SHA}"
              sudo -u "$APP_USER" git -C "$REPO_DIR" checkout -f "$PREV_SHA"
              sudo -u "$APP_USER" "$REPO_DIR/.venv/bin/pip" install -r "$REPO_DIR/requirements.txt"
              sudo systemctl daemon-reload
              sudo systemctl restart swing-scanner.timer
            }
            sudo -u "$APP_USER" git -C "$REPO_DIR" fetch origin
            sudo -u "$APP_USER" git -C "$REPO_DIR" checkout -f "$TARGET_SHA"
            sudo -u "$APP_USER" "$REPO_DIR/.venv/bin/pip" install -r "$REPO_DIR/requirements.txt"
            sudo systemctl daemon-reload
            sudo systemctl restart swing-scanner.timer
            if ! sudo systemctl is-active --quiet swing-scanner.timer; then
              echo "[deploy] timer is not active"
              rollback
              exit 1
            fi
            if ! sudo systemctl show -p LoadState --value swing-scanner.service | grep -qx loaded; then
              echo "[deploy] service unit is not loaded"
              rollback
              exit 1
            fi
            if ! sudo -u "$APP_USER" bash -lc "set -a; source /etc/swing-scanner.env; set +a; $REPO_DIR/.venv/bin/python -m swing_scanner.app --healthcheck --watchlist /opt/swing_scanner/watchlist.txt"; then
              echo "[deploy] healthcheck failed"
              rollback
              exit 1
            fi
