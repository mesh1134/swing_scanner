name: Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to droplet
        # Pin third-party action by commit SHA (tag: v1.0.3).
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/swing_scanner
            git config --global --add safe.directory /opt/swing_scanner
            PREV_SHA=$(git rev-parse HEAD)
            TARGET_SHA=${{ github.sha }}
            rollback() {
              echo "[deploy] Rolling back to ${PREV_SHA}"
              git checkout -f "$PREV_SHA"
              /opt/swing_scanner/.venv/bin/pip install -r requirements.txt
              sudo systemctl daemon-reload
              sudo systemctl restart swing-scanner.timer
            }
            git fetch origin
            git checkout -f "$TARGET_SHA"
            /opt/swing_scanner/.venv/bin/pip install -r requirements.txt
            sudo systemctl daemon-reload
            sudo systemctl restart swing-scanner.timer
            if ! sudo systemctl is-active --quiet swing-scanner.timer; then
              echo "[deploy] timer is not active"
              rollback
              exit 1
            fi
            if ! sudo systemctl show -p LoadState --value swing-scanner.service | grep -qx loaded; then
              echo "[deploy] service unit is not loaded"
              rollback
              exit 1
            fi
            if ! /opt/swing_scanner/.venv/bin/python -m swing_scanner.app --healthcheck --watchlist /opt/swing_scanner/watchlist.txt; then
              echo "[deploy] healthcheck failed"
              rollback
              exit 1
            fi
