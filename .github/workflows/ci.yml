name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint_type:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install tooling
        run: pip install --disable-pip-version-check mypy ruff
      - name: Lint (critical rules)
        run: ruff check --select E9,F63,F7,F82 swing_scanner tests
      - name: Type check (lightweight)
        run: mypy --ignore-missing-imports --follow-imports=silent swing_scanner

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint_type
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install deps
        run: pip install --disable-pip-version-check -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v -b
