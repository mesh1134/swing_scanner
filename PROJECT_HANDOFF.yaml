  open_to_paid_features: false (until usage demands it)

architecture:
  flow: |
    Watchlist -> MarketDataProvider.fetch_candles
              -> CachedProvider (in-memory TTL wrapper)
              -> Strategy.analyze (deterministic filter, returns SetupSignal)
              -> Persistence.save_signal (record technicals for ALL symbols)
              -> if is_candidate (or force_analyze_all):
                    NewsClient.latest_news_summary (grounded news)
                 -> GeminiTradeAnalyst.analyze (structured commentary)
                 -> compute_trade_levels (deterministic entry/target/stop)
                 -> Persistence.save_trade_idea (record AI thesis + levels)
                 -> format_trade_idea (Telegram-friendly text)
                 -> TelegramNotifier.send (skipped in force-mode for non-candidates)
  separation_of_concerns: >
    Strategy decides WHAT qualifies. LLM only EXPLAINS qualifying setups.
    Trade levels are 100% deterministic. Persistence records everything for
    future backtesting.
  composability: >
    Provider, Strategy, NewsClient are all factory-resolved from Settings
    (env vars). DatabaseManager handles SQLite abstraction.

env_vars:
  required_for_full_run:
    GEMINI_API_KEY: from Google AI Studio
    TELEGRAM_BOT_TOKEN: optional (no-op if absent)
    TELEGRAM_CHAT_ID: optional
  optional_with_defaults:
    MARKET_DATA_PROVIDER: yfinance  # also: dhan, finnhub, mock
    SCAN_STRATEGY: swing
    GEMINI_MODEL: gemini-2.5-flash
    NEWS_SOURCE: gemini             # also: perplexity, none
    SCAN_CACHE_TTL: 600
    SCAN_DEBUG: 0
    SCAN_MAX_WORKERS: 8
    SCAN_DB_PATH: scanner.db        # Path to SQLite database

key_files:
  - path: swing_scanner/app.py
    role: CLI entrypoint, parallel scan loop, persistence glue
    flags: [--watchlist, --symbols, --run-once, --debug, --force-analyze-all]
  - path: swing_scanner/persistence.py
    role: DatabaseManager (SQLite); schema for scans, signals, and trade_ideas
    note: Records indicators for ALL scanned symbols to build backtesting data.
  - path: swing_scanner/scheduler.py
    role: NSE-specific timing (09:20, 12:27, 15:15 IST)
    note: 5m after open, 5m after mathematical mid-market, 15m before close.
  - path: swing_scanner/config.py
    role: Settings dataclass; includes scan_db_path
  - path: swing_scanner/strategies/base.py
    role: SetupSignal dataclass + Strategy ABC
  - path: swing_scanner/ai_brain.py
    role: TradeAnalysis dataclass, compute_trade_levels, GeminiTradeAnalyst
  - path: swing_scanner/delivery.py
    role: format_trade_idea + TelegramNotifier
  - path: swing_scanner/watchlist.py
    role: parses watchlist file (# comments, blank lines)
  - path: watchlist.example.txt
    role: 16 NSE tickers, sector-grouped

