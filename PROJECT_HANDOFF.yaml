    SUNPHARMA.NS, ASIANPAINT.NS, ADANIENT.NS

trade_level_math:
  entry: signal.close
  stop: max(ema20 * 0.99, bb_lower, entry * 0.96) where < entry, with 2.0% floor
  target: entry + (entry - stop) * 1.8
  rationale: Picking tightest valid stop, capped at 4%, floored at 2%.

ai_layer:
  model: gemini-2.5-flash
  response_format: strict JSON (thesis, momentum, trend, volume, quality, risks)
  grounding: Google Search (enabled by default)

