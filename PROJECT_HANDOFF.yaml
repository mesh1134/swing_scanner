    Daily swing-trade candidate scanner for Indian equities (NSE).
    Pulls candles -> runs deterministic indicator filter -> on candidate,
    fetches live grounded news -> calls LLM for structured commentary ->
    formats, persists to DB, and pushes to Telegram.
